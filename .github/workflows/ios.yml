name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test (iOS Simulator)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Package Dependencies
        run: xcodebuild -resolvePackageDependencies

      - name: Detect Scheme
        id: scheme
        run: |
          scheme=$(xcodebuild -list -json | ruby -e "require 'json'; data=JSON.parse(STDIN.read); puts data['project']['schemes'][0] rescue data['workspace']['schemes'][0]")
          
          if [ -z "$scheme" ]; then
            echo "❌ No scheme found"
            exit 1
          fi
          
          echo "scheme=$scheme" >> $GITHUB_OUTPUT
          echo "Using scheme: $scheme"

      - name: Detect Project or Workspace
        id: project
        run: |
          if ls *.xcworkspace 1> /dev/null 2>&1; then
            echo "type=workspace" >> $GITHUB_OUTPUT
            echo "file=$(ls *.xcworkspace | head -1)" >> $GITHUB_OUTPUT
          else
            echo "type=project" >> $GITHUB_OUTPUT
            echo "file=$(ls *.xcodeproj | head -1)" >> $GITHUB_OUTPUT
          fi

      - name: Build & Test
        run: |
          xcodebuild \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -${{ steps.project.outputs.type }} "${{ steps.project.outputs.file }}" \
            -destination 'platform=iOS Simulator,OS=latest' \
            clean build test
